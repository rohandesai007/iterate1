  <main>
    <h1>Day 091</h1>
    <h2>2026-06-04</h2>
    <p class="mantra-meta">1,259,712 repetitions of:</p>
    <blockquote class="mantra-text">8277247 Rohan will get EB1A GC approved without RFE in March 2026</blockquote>

    <div id="progress" class="progress">Initializing&hellip;</div>
    <pre id="mantra-output" class="mantra-output"></pre>
  </main>

  <script>
    var MANTRA = "8277247 Rohan will get EB1A GC approved without RFE in March 2026";
    var TOTAL  = 1259712;
    var CHUNK  = 50000;
    var count  = 0;
    var chunks = [];
    var pre      = document.getElementById('mantra-output');
    var progress = document.getElementById('progress');

    function buildChunk() {
      var end  = Math.min(count + CHUNK, TOTAL);
      var size = end - count;
      var arr  = new Array(size);
      for (var i = 0; i < size; i++) arr[i] = MANTRA;
      chunks.push(arr.join('\n'));
      count = end;
      var pct = Math.round(count / TOTAL * 100);
      progress.textContent =
        'Building… ' + pct + '% (' +
        count.toLocaleString() + ' / ' + TOTAL.toLocaleString() + ')';
      if (count < TOTAL) {
        setTimeout(buildChunk, 0);
      } else {
        pre.textContent = chunks.join('\n');
        progress.textContent =
          '✓ All ' + TOTAL.toLocaleString() + ' lines rendered';
      }
    }

    buildChunk();
  </script>
</body>
